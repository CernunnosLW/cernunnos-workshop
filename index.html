  { name:"Cut",icon:"✂️",guidance:"Use a sharp knife and steel rule on a cutting mat — never freehand for straight lines. A rotary cutter is ideal for long straps. Change blades more often than you think: a dull blade drags and tears fibres." },
  { name:"Skive",icon:"🔪",guidance:"Skiving reduces bulk at edges and folds. Work on marble or glass for best control. Aim for a feathered taper — not a blunt step. Keep your skiving knife razor-sharp: more accidents happen with dull blades than sharp ones." },
  { name:"Mark",icon:"📐",guidance:"Use a wing divider or stitching groover to scribe a consistent line parallel to the edge. Mark lightly on the grain side — deep grooves weaken the leather. Always check alignment with a rule before committing." },
  { name:"Punch Holes",icon:"🔨",guidance:"Mark with a pricking iron first, then open each hole with a stitching awl. Work on poundo board or end-grain wood — foam lets holes drift. Keep holes perpendicular to the surface. For hardware, punch one size under the fitting diameter." },
  { name:"Glue",icon:"🧴",guidance:"Roughen both surfaces with sandpaper before applying contact cement. Apply thin even coats to both faces, then let flash off until tacky (2–5 min). Align carefully before pressing — contact cement bonds on first touch. Roll the seam firmly to push out air." },
  { name:"Stitch",icon:"🧵",guidance:"Saddle stitch (two needles, one thread) locks each stitch — far stronger than machine. Keep both needles at equal tension. Lock the last 3 stitches by backstitching, then trim and melt thread tails. Consistent tension matters more than speed." },
  { name:"Dye",icon:"🎨",guidance:"Case (lightly dampen) veg tan before dyeing for even absorption. Apply alcohol dyes with a wool dauber in circular motions. Build colour in thin layers — let each dry fully. Seal with a resist or finish coat to prevent transfer." },
  { name:"Edge Coat",icon:"〰️",guidance:"Sand raw edges through 120 then 240 grit. For veg tan, burnishing gives a clean result. For chrome tan, use edge paint (Tokonole, Fenice). Apply 2–3 thin coats with a wooden applicator, letting each dry before the next. Finish with canvas for gloss." },
  { name:"Burnish",icon:"🪵",guidance:"Dampen the edge lightly with water or gum tragacanth. Rub firmly with a wooden slicker or bone folder — friction heats fibres and compresses them smooth. Multiple passes build a polished sealed surface. Only works on veg tan; chrome tan needs edge paint." },
  { name:"Condition",icon:"✨",guidance:"Apply conditioner (neatsfoot oil, beeswax, or Leather Honey) in thin coats with a clean cloth. Let absorb for several hours before buffing. Don't over-condition — saturated leather weakens and darkens permanently. One light coat is usually enough for new work." },
  { name:"Hardware",icon:"🔩",guidance:"Test all rivets, snaps, and buckles before setting permanently. Use the correct setter — too small deforms the face, too large misses the post. Back rivets with scrap leather when setting on finished work. Always set on a solid steel block, never wood." },
  { name:"Final Check",icon:"☑️",guidance:"Check: stitches even and tails burnt; edges smooth and finished; hardware secure and flat; no glue visible; dye and finish even. Test closures. Inspect under raking light. A horsehair brush lifts dust. This step is most often rushed — give it proper time." },

/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
const fmtTime = s => {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;
  return `${m}:${String(sc).padStart(2,"0")}`;
};
const fmtHrs = s => (s/3600).toFixed(1)+"h";
const totalSecs = tasks => tasks.reduce((a,t)=>a+(t.seconds||0),0);
const totalCost = mats  => mats.reduce((a,m)=>a+(parseFloat(m.cost)||0),0);
const suggestProjects = (w,h,thickMm) => {
  const lo=Math.min(w,h),hi=Math.max(w,h);
  return SCRAP_PROJECTS.filter(s=>{
    const ok=(lo>=s.w[0]&&lo<=s.w[1]&&hi>=s.h[0]&&hi<=s.h[1])||(hi>=s.w[0]&&hi<=s.w[1]&&lo>=s.h[0]&&lo<=s.h[1]);
    if(!ok) return false;
    if(thickMm&&s.thickMin&&thickMm<s.thickMin) return false;
    if(thickMm&&s.thickMax&&thickMm>s.thickMax) return false;
    return true;
  }).sort((a,b)=>a.skill-b.skill);
};

  const totalTime=projects.reduce((a,p)=>a+totalSecs(p.tasks),0);
  const done=projects.filter(p=>p.status==="complete").length;
  const filtered=search.trim()?projects.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.client?.toLowerCase().includes(search.toLowerCase())):projects;

  return (
    <div>

            <div style={{fontSize:9,color:C.faded,textTransform:"uppercase",letterSpacing:"0.09em",fontWeight:700,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      {/* Search */}
      {projects.length>2&&(
        <div style={{position:"relative",marginBottom:16}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search projects…"
            style={{width:"100%",boxSizing:"border-box",padding:"10px 12px 10px 36px",border:`1px solid ${C.borderSoft}`,borderRadius:10,background:C.input,fontFamily:"inherit",fontSize:14,color:C.ink,outline:"none"}}/>
          <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.faded,fontSize:14}}>🔍</div>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",cursor:"pointer",color:C.faded,fontSize:18,lineHeight:1}}>×</button>}
        </div>
      )}
      {filtered.length===0
        ?<EmptyState icon="🧵" heading={search?"No matching projects":"No projects yet"} sub={search?"Try a different search term":"Tap + to start your first build"}/>
        :filtered.map(p=><ProjectCard key={p.id} project={p} onClick={()=>onSelect(p.id)} isRunning={activeTimer?.projectId===p.id}/>)
      }

    </div>
  );
}

function ProjectCard({project,onClick,isRunning}){
  const secs=totalSecs(project.tasks);
  const matCost=totalCost(project.materials);
  const started=project.tasks.filter(t=>t.seconds>0||t.done).length;
  const pct=project.tasks.length>0?Math.round((started/project.tasks.length)*100):0;
  const isComplete=project.status==="complete";
  return (
    <div onClick={onClick} style={{background:C.card,border:`1px solid ${isRunning?C.sage:isComplete?C.gold+"55":C.borderSoft}`,borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer",boxShadow:isRunning?`0 0 0 2px ${C.sage}22,0 3px 16px rgba(20,4,0,0.09)`:`0 3px 16px rgba(20,4,0,0.07),inset 0 1px 0 rgba(255,255,255,0.55)`,position:"relative",overflow:"hidden",transition:"all 0.2s"}}>
      {isRunning&&<div style={{position:"absolute",top:0,left:0,right:0,height:2.5,background:C.sage,borderRadius:"2px 2px 0 0"}}/>}
      {isComplete&&<div style={{position:"absolute",top:0,left:0,right:0,height:2.5,background:C.burnished,borderRadius:"2px 2px 0 0"}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{flex:1,paddingRight:10}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:C.ink,lineHeight:1.2}}>{project.name}</div>
          {project.client&&<div style={{fontSize:12,color:C.bark,marginTop:3}}>📋 {project.client}</div>}
        </div>
        <Badge label={isComplete?"Complete":isRunning?"● Live":"Active"} color={isComplete?C.gold:isRunning?C.sage:C.amber}/>
      </div>
      {project.tasks.length>0&&!isComplete&&(
        <div style={{marginBottom:10}}>
          <div style={{height:4,background:C.borderSoft+"66",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:pct===100?C.sage:C.tan,borderRadius:2,transition:"width 0.4s"}}/>
          </div>
          <div style={{fontSize:10,color:C.faded,marginTop:3,fontWeight:600,letterSpacing:"0.04em"}}>{started}/{project.tasks.length} tasks</div>
        </div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:12,fontSize:12,color:C.bark}}>
        {project.leatherType&&<span>🐄 {project.leatherType}{project.thickness?` · ${project.thickness}`:""}</span>}
        {secs>0&&<span>⏱ {fmtHrs(secs)}</span>}
        {matCost>0&&<span>💰 {matCost.toFixed(2)}</span>}
        <span style={{color:C.faded}}>📌 {project.tasks.length} task{project.tasks.length!==1?"s":""}</span>
      </div>
    </div>
  );
}

        <button onClick={onBack} style={{border:"none",background:"transparent",fontSize:20,cursor:"pointer",color:C.leather,padding:"4px 6px",borderRadius:8}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{project.name}</div>
          {project.client&&<div style={{fontSize:12,color:C.bark}}>{project.client}</div>}
        </div>
        <button onClick={onDuplicate} title="Duplicate project" style={{border:`1px solid ${C.borderSoft}`,background:C.card,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:C.bark,fontFamily:"inherit"}}>⧉</button>
        <select value={project.status} onChange={e=>onUpdateProject({status:e.target.value})} style={{border:`1px solid ${C.borderSoft}`,borderRadius:8,padding:"6px 8px",background:C.card,fontFamily:"inherit",fontSize:12,color:C.ink,cursor:"pointer"}}>
          <option value="in-progress">Active</option>
          <option value="complete">Complete ✓</option>
        </select>
      </div>
      <SubTabs tabs={[{key:"tasks",label:"Tasks"},{key:"costs",label:"Costs"},{key:"notes",label:"Notes"}]} active={pTab} onChange={setPTab}/>
      {pTab==="tasks"&&<TasksTab project={project} activeTimerId={activeTimerId} onTimerToggle={onTimerToggle} onUpdateTask={onUpdateTask} onDeleteTask={onDeleteTask} onAddTask={onAddTask}/>}
      {pTab==="costs"&&<CostsTab project={project} settings={settings} secs={secs} matCost={matCost} timeCost={timeCost} total={total} suggested={suggested} markup={markup} onSetMarkup={v=>onUpdateProject({markup:v})} onAddMaterial={onAddMaterial} onDeleteMaterial={onDeleteMaterial}/>}
      {pTab==="notes"&&<NotesTab project={project} onUpdateProject={onUpdateProject}/>}
    </div>
  );
}

function TasksTab({project,activeTimerId,onTimerToggle,onUpdateTask,onDeleteTask,onAddTask}){
  const totalTime=totalSecs(project.tasks);
  return (
    <div>
      <InfoBanner>
        <strong>Track your time, know your worth.</strong> Every second logged feeds your pricing — so you never undersell. Tap <strong>▶</strong> to start, or <strong>✎</strong> to enter time manually. Expand a task for technique guidance and your notes.
      </InfoBanner>
      {totalTime>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.cardDeep,borderRadius:9,padding:"8px 14px",marginBottom:14,border:`1px solid ${C.borderSoft}44`}}>
          <span style={{fontSize:11,fontWeight:700,color:C.faded,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total time logged</span>
          <span style={{fontSize:18,fontFamily:"'Courier New',monospace",fontWeight:700,color:C.sienna}}>{fmtTime(totalTime)}</span>
        </div>
      )}
      {project.tasks.length===0
        ?<EmptyState icon="✂️" heading="No tasks yet" sub="Add tasks to start tracking your build"/>
        :project.tasks.map(t=>(
            <TaskCard key={t.id} task={t} isActive={activeTimerId===t.id}
              onToggleTimer={()=>onTimerToggle(t.id)}
              onUpdateTask={u=>onUpdateTask(t.id,u)}
              onDelete={()=>onDeleteTask(t.id)}/>
          ))
      }
      <Btn onClick={onAddTask} style={{width:"100%",marginTop:8}} variant="secondary">+ Add Task</Btn>
    </div>
  );
}

function TaskCard({task,isActive,onToggleTimer,onUpdateTask,onDelete}){
  const [expanded,setExpanded]=useState(false);
  const [editingTime,setEditingTime]=useState(false);
  const [mHrs,setMHrs]=useState("");
  const [mMins,setMins]=useState("");
  const preset=TASK_PRESETS.find(p=>p.name===task.name);
  const hasDone=task.seconds>0||task.done;

  const saveManual=()=>{
    const total=Math.round(((parseFloat(mHrs)||0)*3600)+((parseFloat(mMins)||0)*60));
    if(total>=0) onUpdateTask({seconds:total});
    setEditingTime(false); setMHrs(""); setMins("");
  };

  const borderColor=isActive?C.sage:task.done?C.gold:hasDone?C.sage+"88":C.borderSoft;

  return (
    <div style={{background:C.card,borderRadius:12,marginBottom:9,overflow:"hidden",border:`1px solid ${borderColor}`,boxShadow:isActive?`0 0 0 2px ${C.sage}18,0 2px 10px rgba(20,4,0,0.06)`:`0 2px 10px rgba(20,4,0,0.05)`,transition:"all 0.2s"}}>
      <div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:12}}>
        {/* Done checkbox */}
        <button onClick={()=>onUpdateTask({done:!task.done})} style={{width:26,height:26,borderRadius:6,border:`1.5px solid ${task.done?C.gold:C.borderSoft}`,background:task.done?C.burnished+"22":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.18s"}}>
          {task.done&&<span style={{fontSize:13,color:C.gold,fontWeight:700}}>✓</span>}
        </button>
        <div style={{fontSize:22,lineHeight:1,flexShrink:0,opacity:task.done?0.5:1}}>{task.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,color:task.done?C.bark:C.ink,fontSize:14,marginBottom:5,textDecoration:task.done?"line-through":"none"}}>{task.name}</div>
          {editingTime?(
            <div>
              <div style={{fontSize:10,color:C.faded,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Enter time manually</div>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                {[{v:mHrs,set:setMHrs,label:"hrs"},{v:mMins,set:setMins,label:"min"}].map(f=>(
                  <div key={f.label} style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" value={f.v} onChange={e=>f.set(e.target.value)} placeholder="0" min="0"
                      style={{width:48,padding:"5px 7px",border:`1px solid ${C.borderSoft}`,borderRadius:7,fontSize:14,fontFamily:"inherit",textAlign:"center",background:C.input}}/>
                    <span style={{fontSize:11,color:C.faded,fontWeight:600}}>{f.label}</span>
                  </div>
                ))}
                <Btn small onClick={saveManual} variant="success">Save</Btn>
                <Btn small variant="ghost" onClick={()=>setEditingTime(false)}>✕</Btn>
              </div>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontSize:19,fontFamily:"'Courier New',monospace",fontWeight:700,color:isActive?C.sage:hasDone?C.sageLight:C.bark,letterSpacing:"0.02em"}}>{fmtTime(task.seconds)}</span>
              <button onClick={()=>setEditingTime(true)} style={{border:`1px solid ${C.borderSoft}`,borderRadius:5,background:C.bg,padding:"2px 8px",cursor:"pointer",fontSize:10,color:C.faded,fontWeight:700,fontFamily:"inherit",letterSpacing:"0.04em"}}>✎ edit</button>
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
          <button onClick={onToggleTimer} style={{width:44,height:44,borderRadius:22,border:"none",cursor:"pointer",background:isActive?`linear-gradient(145deg,${C.sage},#0E2A16)`:`linear-gradient(145deg,${C.oxblood},${C.leather})`,color:"#FAF0D8",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isActive?`0 0 16px ${C.sage}55,0 2px 8px rgba(20,4,0,0.3)`:`0 3px 10px rgba(20,4,0,0.28)`,transition:"all 0.2s"}}>
            {isActive?"⏸":"▶"}
          </button>
          <button onClick={()=>setExpanded(x=>!x)} style={{border:"none",background:"transparent",cursor:"pointer",color:C.faded,fontSize:10,padding:2,fontFamily:"inherit",fontWeight:600,letterSpacing:"0.04em"}}>
            {expanded?"▲":"▼ more"}
          </button>
        </div>
      </div>
      {expanded&&(
        <div style={{borderTop:`1px solid ${C.borderSoft}44`,background:C.cardDeep}}>
          {preset?.guidance&&(
            <div style={{padding:"14px 16px 12px",borderBottom:`1px dashed ${C.borderSoft}66`}}>
              <div style={{fontSize:10,fontWeight:800,color:C.tan,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Technique</div>
              <div style={{fontSize:13,color:C.ink,lineHeight:1.8}}>{preset.guidance}</div>
            </div>
          )}
          <div style={{padding:"12px 16px 14px"}}>
            <div style={{fontSize:10,color:C.faded,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Your Notes</div>
            <textarea value={task.notes||""} onChange={e=>onUpdateTask({notes:e.target.value})}
              placeholder="Observations, issues, things to remember…" rows={3}
              style={{width:"100%",boxSizing:"border-box",border:`1px solid ${C.borderSoft}`,borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13,background:C.input,color:C.ink,resize:"none",lineHeight:1.6}}/>
            <Btn small variant="danger" onClick={onDelete} style={{marginTop:8}}>Delete Task</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function CostsTab({project,settings,secs,matCost,timeCost,total,suggested,markup,onSetMarkup,onAddMaterial,onDeleteMaterial}){
  const margin=suggested-total;
  const marginPct=total>0?Math.round((margin/suggested)*100):0;
  return (
    <div>
      <Card style={{background:`linear-gradient(160deg,${C.leather}0A,${C.oxblood}08)`,borderColor:C.border+"66"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:C.leather,marginBottom:14}}>Cost Summary</div>
        {[
          {label:"Materials",val:`${settings.currency}${matCost.toFixed(2)}`},
          {label:`Time · ${fmtHrs(secs)} @ ${settings.currency}${settings.hourlyRate}/hr`,val:`${settings.currency}${timeCost.toFixed(2)}`},
          {label:"Total Cost",val:`${settings.currency}${total.toFixed(2)}`,bold:true},
          {label:`Suggested Price (×${markup})`,val:`${settings.currency}${suggested.toFixed(2)}`,gold:true},
          {label:"Potential Margin",val:`${settings.currency}${margin.toFixed(2)} · ${marginPct}%`,green:true},
        ].map(r=>(
          <div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.borderSoft}44`}}>
            <span style={{fontSize:12,color:C.bark}}>{r.label}</span>
            <span style={{fontWeight:r.bold||r.gold||r.green?700:500,fontSize:r.gold?18:14,color:r.gold?C.burnished:r.green?C.sage:C.ink}}>{r.val}</span>
          </div>
        ))}
        {/* Per-project markup override */}
        <div style={{marginTop:14,paddingTop:12,borderTop:`1px dashed ${C.borderSoft}`}}>
          <div style={{fontSize:10,color:C.faded,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Price Multiplier for this project</div>
          <div style={{display:"flex",gap:7}}>
            {["2","2.5","3","3.5","4"].map(m=>(
              <button key={m} onClick={()=>onSetMarkup(parseFloat(m))} style={{border:`1px solid ${String(markup)===m?C.leather:C.borderSoft}`,borderRadius:7,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:String(markup)===m?C.leather:C.card,color:String(markup)===m?"#FAF0D8":C.bark,transition:"all 0.15s"}}>×{m}</button>
            ))}
          </div>
        </div>
      </Card>
      <Divider label="Materials"/>
      {project.materials.length===0&&<div style={{fontSize:13,color:C.bark,marginBottom:12,fontStyle:"italic"}}>No materials added yet.</div>}
      {project.materials.map(m=>(
        <div key={m.id} style={{display:"flex",alignItems:"center",background:C.card,border:`1px solid ${C.borderSoft}`,borderRadius:10,padding:"10px 14px",marginBottom:8,gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,color:C.ink,fontSize:13}}>{m.name}</div>
            {m.qty&&<div style={{fontSize:11,color:C.bark}}>{m.qty}</div>}
          </div>
          <div style={{fontWeight:700,color:C.sienna,fontSize:15}}>{settings.currency}{parseFloat(m.cost||0).toFixed(2)}</div>
          <button onClick={()=>onDeleteMaterial(m.id)} style={{border:"none",background:"transparent",color:C.crimson,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
        </div>
      ))}
      <Btn onClick={onAddMaterial} style={{width:"100%",marginTop:4}} variant="secondary">+ Add Material</Btn>
    </div>
  );
}

function NotesTab({project,onUpdateProject}){
  return (
    <div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Field label="Leather Type" value={project.leatherType||""} placeholder="Veg Tan, Chrome Tan…" onChange={v=>onUpdateProject({leatherType:v})}/></div>
        <div style={{flex:1}}><Field label="Thickness" value={project.thickness||""} placeholder="2mm, 3–4oz…" onChange={v=>onUpdateProject({thickness:v})}/></div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Field label="Thread" value={project.thread||""} placeholder="Waxed linen, natural" onChange={v=>onUpdateProject({thread:v})}/></div>
        <div style={{flex:1}}><Field label="Needle" value={project.needle||""} placeholder="John James No.2" onChange={v=>onUpdateProject({needle:v})}/></div>
      </div>
      <Field label="Client" value={project.client||""} placeholder="Name or 'Personal'" onChange={v=>onUpdateProject({client:v})}/>
      <Field label="Build Notes" value={project.notes||""} placeholder="Observations, tips, things to remember…" onChange={v=>onUpdateProject({notes:v})} rows={9}/>

}

/* ══════════════════════════════════════════════════════════
   SCRAPS TAB
══════════════════════════════════════════════════════════ */
function ScrapsTab({scraps,onAdd,onDelete,onStartProject}){
  const [view,setView]=useState("scraps");
  const [catFilter,setCatFilter]=useState("All");
  const [selectedProj,setSelectedProj]=useState(null);

  if(selectedProj) return <ScrapProjectDetail proj={selectedProj} onClose={()=>setSelectedProj(null)} onStart={()=>{onStartProject(selectedProj);setSelectedProj(null);}}/>;

  const totalPossible=scraps.reduce((a,s)=>a+suggestProjects(s.width,s.height,parseFloat(s.thicknessMm)||undefined).length,0);
  return (
    <div>
      <div style={{background:`linear-gradient(145deg,${C.leather} 0%,${C.oxblood} 100%)`,borderRadius:16,padding:"20px 18px",marginBottom:20,position:"relative",overflow:"hidden",boxShadow:`0 6px 28px rgba(20,4,0,0.22)`}}>
        <div style={{position:"absolute",right:-10,top:-15,fontSize:90,opacity:0.06,transform:"rotate(-12deg)",userSelect:"none",lineHeight:1}}>✂️</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:800,color:"#FAF0D8",marginBottom:6,letterSpacing:"-0.01em"}}>Scrap Bin</div>
        <div style={{fontSize:13,color:"#FAF0D8BB",lineHeight:1.6,maxWidth:270}}>Log your offcuts and discover what you can build with what you have.</div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          {[{label:"Pieces",val:scraps.length},{label:"Possible Builds",val:totalPossible},{label:"Project Types",val:SCRAP_PROJECTS.length}].map(s=>(
            <div key={s.label} style={{background:"#FAF0D818",borderRadius:10,padding:"10px 0",flex:1,textAlign:"center",border:"1px solid rgba(255,240,216,0.12)"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:800,color:"#FAF0D8"}}>{s.val}</div>
              <div style={{fontSize:9,color:"#FAF0D888",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
      <SubTabs tabs={[{key:"scraps",label:"My Scraps"},{key:"browse",label:"Browse All"}]} active={view} onChange={setView}/>
      {view==="scraps"&&(
        <>
          {scraps.length===0?<EmptyState icon="✂️" heading="No scraps logged" sub="Add an offcut to discover what you can build from it"/>
            :scraps.map(s=><ScrapCard key={s.id} scrap={s} onDelete={()=>onDelete(s.id)} onSelectProject={setSelectedProj}/>)}
          <FAB onClick={onAdd}/>
        </>
      )}
      {view==="browse"&&<BrowseProjects filter={catFilter} setFilter={setCatFilter} onSelect={setSelectedProj}/>}
    </div>
  );
}

function ScrapCard({scrap,onDelete,onSelectProject}){
  const [expanded,setExpanded]=useState(false);
  const thick=parseFloat(scrap.thicknessMm)||undefined;
  const suggestions=suggestProjects(scrap.width,scrap.height,thick);
  const area=((scrap.width*scrap.height)/929).toFixed(2);
  const mxD=68,ratio=scrap.width/scrap.height;
  const pw=ratio>=1?mxD:mxD*ratio, ph=ratio<1?mxD:mxD/ratio;
  const desc=scrap.description?.toLowerCase()||"";
  const hue=desc.includes("black")?"#1A1008":desc.includes("veg")?"#B8883A":desc.includes("suede")?"#8A6040":desc.includes("dark")?"#3A1A08":"#A06528";
  return (
    <div style={{background:C.card,border:`1px solid ${C.borderSoft}`,borderRadius:16,marginBottom:14,overflow:"hidden",boxShadow:`0 3px 18px rgba(20,4,0,0.08),inset 0 1px 0 rgba(255,255,255,0.5)`}}>
      <div style={{display:"flex",gap:14,padding:"16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",minWidth:78}}>
          <div style={{width:pw,height:ph,background:hue,borderRadius:5,position:"relative",flexShrink:0,boxShadow:`inset 0 2px 8px rgba(255,255,255,0.12),inset 0 -3px 8px rgba(0,0,0,0.32),2px 4px 10px rgba(20,4,0,0.22)`,backgroundImage:"repeating-linear-gradient(40deg,transparent,transparent 3px,rgba(255,255,255,0.03) 3px,rgba(255,255,255,0.03) 6px)"}}>
            <div style={{position:"absolute",bottom:2,right:3,fontSize:7,color:"rgba(255,255,255,0.3)",fontWeight:700,letterSpacing:"0.05em"}}>{scrap.width}×{scrap.height}</div>
          </div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700,color:C.ink}}>{scrap.width} × {scrap.height} cm</div>
              <div style={{fontSize:12,color:C.bark,marginTop:2}}>{[scrap.thicknessMm&&`${scrap.thicknessMm}mm`,scrap.description].filter(Boolean).join(" · ")}</div>
              <div style={{fontSize:11,color:C.tan,marginTop:4,fontWeight:600}}>≈ {area} sq ft</div>
            </div>
            <button onClick={onDelete} style={{border:"none",background:"transparent",color:C.crimson,cursor:"pointer",fontSize:18,lineHeight:1,padding:4}}>×</button>
          </div>
          <div style={{marginTop:10}}>
            {suggestions.length===0
              ?<div style={{fontSize:12,color:C.faded,fontStyle:"italic"}}>No standard project fits this exact size — try adjusting dimensions.</div>
              :<div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {suggestions.slice(0,3).map(p=>(
                  <button key={p.id} onClick={()=>onSelectProject(p)} style={{border:`1px solid ${C.borderSoft}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",background:C.cardDeep,color:C.leather,fontFamily:"inherit",letterSpacing:"0.02em"}}>{p.icon} {p.name}</button>
                ))}
                {suggestions.length>3&&<button onClick={()=>setExpanded(true)} style={{border:`1px solid ${C.burnished}66`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",background:C.burnished+"14",color:C.burnished,fontFamily:"inherit"}}>+{suggestions.length-3} more</button>}
              </div>
            }
          </div>
        </div>
      </div>
      {suggestions.length>0&&(
        <>
          <button onClick={()=>setExpanded(x=>!x)} style={{width:"100%",border:"none",borderTop:`1px solid ${C.borderSoft}55`,background:C.cardDeep+"AA",padding:"9px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"inherit",fontSize:12,fontWeight:700,color:C.bark,letterSpacing:"0.03em"}}>
            <span>🔍 {expanded?"Hide":"Show all"} {suggestions.length} possible build{suggestions.length!==1?"s":""}</span>
            <span style={{fontSize:10}}>{expanded?"▲":"▼"}</span>
          </button>
          {expanded&&(
            <div style={{borderTop:`1px solid ${C.borderSoft}33`,padding:"10px 14px 4px"}}>
              {suggestions.map(p=><SuggestionRow key={p.id} proj={p} onSelect={onSelectProject}/>)}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function SuggestionRow({proj,onSelect}){
  return (
    <div onClick={()=>onSelect(proj)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 6px",borderBottom:`1px solid ${C.borderSoft}33`,cursor:"pointer"}}>
      <div style={{fontSize:24,width:34,textAlign:"center",flexShrink:0}}>{proj.icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,color:C.ink,fontSize:14}}>{proj.name}</div>
        <div style={{fontSize:11,color:C.bark,marginTop:2}}>{proj.category} · {proj.time}</div>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <Badge label={SKILL_LABEL[proj.skill]} color={SKILL_COLOR[proj.skill]}/>
        <div style={{fontSize:11,color:C.burnished,fontWeight:700,marginTop:4}}>{proj.sells}</div>
      </div>
      <div style={{color:C.bark,fontSize:14,flexShrink:0}}>›</div>
    </div>
  );
}

function BrowseProjects({filter,setFilter,onSelect}){
  const filtered=filter==="All"?SCRAP_PROJECTS:SCRAP_PROJECTS.filter(p=>p.category===filter);
  return (
    <div>
      <div style={{fontSize:13,color:C.bark,marginBottom:14,lineHeight:1.6}}>Explore all {SCRAP_PROJECTS.length} project types. Tap any for the full build guide.</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
        {SCRAP_CATS.map(cat=>(
          <button key={cat} onClick={()=>setFilter(cat)} style={{border:`1px solid ${filter===cat?C.leather:C.borderSoft}`,borderRadius:20,padding:"5px 13px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",flexShrink:0,letterSpacing:"0.04em",background:filter===cat?C.leather:C.card,color:filter===cat?"#FAF0D8":C.bark}}>{cat}</button>
        ))}
      </div>
      {filtered.map(p=><SuggestionRow key={p.id} proj={p} onSelect={onSelect}/>)}
    </div>
  );
}

function ScrapProjectDetail({proj,onClose,onStart}){
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button onClick={onClose} style={{border:"none",background:"transparent",fontSize:20,cursor:"pointer",color:C.leather}}>←</button>

/* ══════════════════════════════════════════════════════════
   KNOWLEDGE TAB
══════════════════════════════════════════════════════════ */
function KnowledgeTab(){
  const [article,setArticle]=useState(null);
  const [tag,setTag]=useState("All");
  const tags=["All",...new Set(KNOWLEDGE_TOPICS.map(t=>t.tag))];
  const fetchArticle=async(topic)=>{
    setArticle({title:topic.title,loading:true});
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic.wiki)}`);
      const d=await r.json();
      setArticle({title:topic.title,extract:d.extract||"No summary available.",thumbnail:d.thumbnail?.source});
    }catch{
      setArticle({title:topic.title,extract:"Could not load article.",error:true});
    }
  };
  const filtered=tag==="All"?KNOWLEDGE_TOPICS:KNOWLEDGE_TOPICS.filter(t=>t.tag===tag);
  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:C.ink,marginBottom:4,letterSpacing:"-0.01em"}}>Knowledge</div>
      <div style={{fontSize:13,color:C.bark,marginBottom:16,lineHeight:1.5}}>Leathercraft reference — powered by Wikipedia.</div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:6,marginBottom:16}}>
        {tags.map(t=>(
          <button key={t} onClick={()=>setTag(t)} style={{border:`1px solid ${tag===t?C.leather:C.borderSoft}`,borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",background:tag===t?C.leather:C.card,color:tag===t?"#FAF0D8":C.bark,flexShrink:0,letterSpacing:"0.04em"}}>{t}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        {filtered.map(topic=>(
          <div key={topic.wiki} onClick={()=>fetchArticle(topic)} style={{background:C.card,border:`1px solid ${C.borderSoft}`,borderRadius:12,padding:"13px",cursor:"pointer",boxShadow:`0 2px 8px rgba(20,4,0,0.06),inset 0 1px 0 rgba(255,255,255,0.5)`}}>
            <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:7,fontFamily:"'Cormorant Garamond',serif"}}>{topic.title}</div>
            <Badge label={topic.tag} color={C.tan}/>
          </div>
        ))}
      </div>
      {article&&(
        <Overlay onClose={()=>setArticle(null)}>
          <ModalTitle>{article.title}</ModalTitle>
          {article.thumbnail&&!article.error&&<img src={article.thumbnail} alt="" style={{width:"100%",borderRadius:10,marginBottom:14,maxHeight:200,objectFit:"cover"}}/>}
          {article.loading?<div style={{textAlign:"center",padding:32,color:C.bark,fontStyle:"italic"}}>Loading…</div>
            :<div style={{fontSize:14,color:C.ink,lineHeight:1.8}}>{article.extract}</div>}
          {!article.loading&&!article.error&&<div style={{marginTop:12,fontSize:10,color:C.faded,fontStyle:"italic"}}>Wikipedia · CC BY-SA</div>}
          <Btn onClick={()=>setArticle(null)} variant="secondary" style={{width:"100%",marginTop:16}}>Close</Btn>
        </Overlay>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   TOOLS TAB
══════════════════════════════════════════════════════════ */
function ToolsTab({settings}){
  const [tool,setTool]=useState("stitch");
  const [seamLen,setSeamLen]=useState("");
  const [spacing,setSpacing]=useState("4");
  const [layers,setLayers]=useState([{id:uid(),mm:""},{id:uid(),mm:""}]);
  const [sqFt,setSqFt]=useState("");
  const [ppsf,setPpsf]=useState("");
  const count=seamLen&&spacing?Math.ceil(parseFloat(seamLen)/parseFloat(spacing)):0;
  const thread=count>0?((count*parseFloat(spacing)*3)/10).toFixed(1):0;
  const thick=layers.reduce((a,l)=>a+(parseFloat(l.mm)||0),0);
  const hideCost=sqFt&&ppsf?(parseFloat(sqFt)*parseFloat(ppsf)).toFixed(2):null;
  const RRow=({label,val,gold})=>(
    <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.borderSoft}44`}}>
      <span style={{fontSize:12,color:C.bark}}>{label}</span>
      <span style={{fontWeight:700,fontSize:gold?18:14,color:gold?C.burnished:C.ink}}>{val}</span>
    </div>
  );
  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:C.ink,marginBottom:4,letterSpacing:"-0.01em"}}>Calculators</div>
      <div style={{fontSize:13,color:C.bark,marginBottom:20}}>Workshop maths, done for you.</div>
      <SubTabs tabs={[{key:"stitch",label:"Stitch"},{key:"layers",label:"Layers"},{key:"cost",label:"Material Cost"}]} active={tool} onChange={setTool}/>
      {tool==="stitch"&&(
        <Card>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:C.ink,marginBottom:16}}>🧵 Stitch Calculator</div>
          <Field label="Seam length (mm)" value={seamLen} onChange={setSeamLen} type="number" placeholder="e.g. 180"/>
          <Field label="Stitch spacing (mm)" value={spacing} onChange={setSpacing} type="number" placeholder="e.g. 4"/>
          {count>0&&<div style={{background:C.cardDeep,borderRadius:10,padding:14}}><RRow label="Stitches needed" val={count}/><RRow label="Thread needed" val={`${thread} cm`} gold/><div style={{fontSize:11,color:C.faded,marginTop:10,fontStyle:"italic"}}>Saddle stitch, ~3× spacing. Add 15% for knots.</div></div>}
        </Card>
      )}
      {tool==="layers"&&(
        <Card>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:C.ink,marginBottom:16}}>📏 Layer Stack</div>
          {layers.map((l,i)=>(
            <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <input type="number" value={l.mm} placeholder={`Layer ${i+1} (mm)`} onChange={e=>setLayers(prev=>prev.map(x=>x.id===l.id?{...x,mm:e.target.value}:x))} style={{flex:1,padding:"10px 12px",border:`1px solid ${C.borderSoft}`,borderRadius:9,fontFamily:"inherit",fontSize:14,background:C.input}}/>
              {layers.length>1&&<button onClick={()=>setLayers(prev=>prev.filter(x=>x.id!==l.id))} style={{border:"none",background:"transparent",color:C.crimson,cursor:"pointer",fontSize:20}}>×</button>}
            </div>
          ))}
          <Btn variant="secondary" small onClick={()=>setLayers(prev=>[...prev,{id:uid(),mm:""}])} style={{marginBottom:14}}>+ Add Layer</Btn>
          {thick>0&&<div style={{background:C.cardDeep,borderRadius:10,padding:14}}><RRow label="Total" val={`${thick.toFixed(1)} mm`} gold/><RRow label="Approx. oz" val={`${(thick/0.4).toFixed(1)} oz`}/><RRow label="Inches" val={`${(thick/25.4).toFixed(3)}"`}/></div>}
        </Card>
      )}
      {tool==="cost"&&(
        <Card>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:C.ink,marginBottom:16}}>💰 Hide Cost</div>
          <Field label={`Price per sq ft (${settings.currency})`} value={ppsf} onChange={setPpsf} type="number" placeholder="e.g. 8.50"/>
          <Field label="Area needed (sq ft)" value={sqFt} onChange={setSqFt} type="number" placeholder="e.g. 2.5"/>
          {hideCost&&<div style={{background:C.cardDeep,borderRadius:10,padding:14}}><RRow label="Raw cost" val={`${settings.currency}${hideCost}`} gold/><RRow label="+15% waste" val={`${settings.currency}${(parseFloat(hideCost)*1.15).toFixed(2)}`}/><RRow label="+20% waste" val={`${settings.currency}${(parseFloat(hideCost)*1.2).toFixed(2)}`}/></div>}
        </Card>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   SPLASH SCREEN
══════════════════════════════════════════════════════════ */
function SplashScreen({onDone}){
  const [fading,setFading]=useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setFading(true),1900);
    const t2=setTimeout(()=>onDone(),2500);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return (
    <div style={{position:"fixed",inset:0,background:`linear-gradient(160deg,${C.leather} 0%,${C.oxblood} 55%,#2A0800 100%)`,zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18,transition:"opacity 0.55s ease",opacity:fading?0:1,pointerEvents:"none"}}>
      <CLLogo size={120} color={C.burnished}/>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:800,color:"#FAF0D8",letterSpacing:"0.14em",textTransform:"uppercase",lineHeight:1}}>Cernunnos</div>
        <div style={{fontSize:11,color:`${C.burnished}BB`,letterSpacing:"0.22em",textTransform:"uppercase",fontWeight:600,marginTop:5}}>Leatherworks</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,width:160,marginTop:4}}>
        <div style={{flex:1,height:0.5,background:`${C.burnished}44`}}/>
        <div style={{fontSize:9,color:`${C.burnished}66`,letterSpacing:"0.18em",textTransform:"uppercase",fontWeight:700,whiteSpace:"nowrap"}}>Workshop</div>
        <div style={{flex:1,height:0.5,background:`${C.burnished}44`}}/>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════════════════════ */
function BottomNav({active,onChange}){
  const items=[{key:"projects",icon:"📋",label:"Projects"},{key:"scraps",icon:"✂️",label:"Scraps"},{key:"knowledge",icon:"📚",label:"Learn"},{key:"ideas",icon:"💡",label:"Ideas"},{key:"tools",icon:"🔧",label:"Tools"}];
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:`linear-gradient(180deg,${C.card} 0%,#F5EDD6 100%)`,borderTop:`1px solid ${C.borderSoft}`,display:"flex",zIndex:60,boxShadow:`0 -4px 24px rgba(20,4,0,0.10)`}}>
      {items.map(item=>(
        <button key={item.key} onClick={()=>onChange(item.key)} style={{flex:1,border:"none",background:"transparent",cursor:"pointer",padding:"9px 4px 13px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
          <span style={{fontSize:20,opacity:active===item.key?1:0.55,transition:"opacity 0.15s"}}>{item.icon}</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",fontFamily:"'Lora',serif",color:active===item.key?C.leather:C.faded,transition:"color 0.15s"}}>{item.label}</span>
          {active===item.key&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:C.burnished,borderRadius:"2px 2px 0 0"}}/>}
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════ */
function CernunnosWorkshop(){
  const [splashDone,setSplashDone]=useState(false);
  const [tab,setTab]=useState("projects");
  const [projects,setProjects]=useState(SAMPLE_PROJECTS);
  const [scraps,setScraps]=useState(SAMPLE_SCRAPS);
  const [ideas,setIdeas]=useState([]);
  const [settings,setSettings]=useState({currency:"£",hourlyRate:25,priceMultiplier:2.5});
  const [activeTimer,setActiveTimer]=useState(null);
  const [selectedProjectId,setSelectedProjectId]=useState(null);
  const [modal,setModal]=useState(null);
  const timerRef=useRef(null);

  useEffect(()=>{
    clearInterval(timerRef.current);
    if(activeTimer){
      timerRef.current=setInterval(()=>{
        setProjects(prev=>prev.map(p=>p.id!==activeTimer.projectId?p:{...p,tasks:p.tasks.map(t=>t.id!==activeTimer.taskId?t:{...t,seconds:(t.seconds||0)+1})}));
      },1000);
    }
    return()=>clearInterval(timerRef.current);
  },[activeTimer]);

  const addProject=({name,client,leatherType})=>{
    const proj={id:uid(),name,client,leatherType,thickness:"",thread:"",needle:"",status:"in-progress",notes:"",tasks:[],materials:[],markup:settings.priceMultiplier,createdAt:Date.now()};
    setProjects(prev=>[proj,...prev]);
    setSelectedProjectId(proj.id);
    setModal(null);
  };
  const updateProject=(id,updates)=>setProjects(prev=>prev.map(p=>p.id===id?{...p,...updates}:p));
  const duplicateProject=(project)=>{
    const dup={...project,id:uid(),name:`${project.name} (copy)`,status:"in-progress",createdAt:Date.now(),tasks:project.tasks.map(t=>({...t,id:uid(),seconds:0,done:false})),materials:project.materials.map(m=>({...m,id:uid()}))};
    setProjects(prev=>[dup,...prev]);
    setSelectedProjectId(dup.id);
  };
  const addTask=(projectId,{name,icon})=>{setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,tasks:[...p.tasks,{id:uid(),name,icon,seconds:0,notes:"",done:false}]}));setModal(null);};
  const updateTask=(projectId,taskId,updates)=>setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,tasks:p.tasks.map(t=>t.id===taskId?{...t,...updates}:t)}));
  const deleteTask=(projectId,taskId)=>{if(activeTimer?.taskId===taskId)setActiveTimer(null);setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,tasks:p.tasks.filter(t=>t.id!==taskId)}));};
  const toggleTimer=(projectId,taskId)=>setActiveTimer(prev=>prev?.taskId===taskId&&prev?.projectId===projectId?null:{projectId,taskId});
  const addMaterial=(projectId,mat)=>{setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,materials:[...p.materials,{...mat,id:uid()}]}));setModal(null);};
  const deleteMaterial=(projectId,matId)=>setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,materials:p.materials.filter(m=>m.id!==matId)}));
  const startFromScrap=(scrapProj)=>{
    const tasks=scrapProj.tasks.map(n=>{const pr=TASK_PRESETS.find(p=>p.name===n)||{icon:"🔧"};return{id:uid(),name:n,icon:pr.icon,seconds:0,notes:"",done:false};});
    const proj={id:uid(),name:scrapProj.name,client:"",leatherType:"",thickness:"",thread:"",needle:"",status:"in-progress",notes:`Workshop tip: ${scrapProj.tips}\n\nEstimated time: ${scrapProj.time}\nSuggested price: ${scrapProj.sells}`,tasks,materials:[],markup:settings.priceMultiplier,createdAt:Date.now()};
    setProjects(prev=>[proj,...prev]);setSelectedProjectId(proj.id);setTab("projects");
  };
  const startFromIdea=(idea)=>{
    const proj={id:uid(),name:idea.title,client:"",leatherType:"",thickness:"",thread:"",needle:"",status:"in-progress",notes:idea.description||"",tasks:[],materials:[],markup:settings.priceMultiplier,createdAt:Date.now()};
    setProjects(prev=>[proj,...prev]);setSelectedProjectId(proj.id);setTab("projects");
  };

  const selectedProject=projects.find(p=>p.id===selectedProjectId);
  const handleTabChange=t=>{setSelectedProjectId(null);setTab(t);};

  return (
    <div style={{fontFamily:"'Lora','Georgia',serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:82}}>
      {!splashDone&&<SplashScreen onDone={()=>setSplashDone(true)}/>}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=Lora:wght@400;500;600&display=swap');
        *{box-sizing:border-box;}
        body{margin:0;background:#DFC88E;}
        input,textarea,select{outline:none;font-family:inherit;}
        input:focus,textarea:focus{border-color:${C.border}!important;box-shadow:0 0 0 2px ${C.border}22;}
        button:active{transform:scale(0.96);}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${C.borderSoft};border-radius:4px;}
        ::placeholder{color:${C.faded}99;}
      `}</style>

      {/* ─── Sticky Header ─── */}
      {!selectedProject&&(
        <div style={{background:`linear-gradient(160deg,${C.leather} 0%,${C.oxblood} 100%)`,padding:"14px 18px 12px",position:"sticky",top:0,zIndex:40,borderBottom:`1px solid ${C.burnished}44`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <CLLogo size={38} color={C.burnished}/>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:800,color:"#FAF0D8",letterSpacing:"0.05em",textTransform:"uppercase",lineHeight:1}}>Cernunnos</div>
                <div style={{fontSize:9,color:`${C.burnished}CC`,letterSpacing:"0.16em",textTransform:"uppercase",fontWeight:700,marginTop:2}}>Leatherworks · Workshop</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {activeTimer&&<div style={{background:`${C.sage}44`,border:`1px solid ${C.sage}88`,borderRadius:20,padding:"4px 11px",fontSize:11,color:"#A0E0B0",fontWeight:700,letterSpacing:"0.04em"}}>● Live</div>}
              <button onClick={()=>setModal({type:"settings"})} style={{border:`1px solid rgba(196,160,48,0.3)`,background:"rgba(250,240,216,0.08)",borderRadius:20,padding:"5px 11px",cursor:"pointer",fontSize:13,color:"#FAF0D8AA",fontWeight:600}}>⚙️</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── Content ─── */}
      <div style={{padding:selectedProject?"14px 16px 0":"18px 16px 0"}}>
        {selectedProject?(
          <ProjectDetail project={selectedProject}
            activeTimerId={activeTimer?.projectId===selectedProject.id?activeTimer.taskId:null}
            onTimerToggle={taskId=>toggleTimer(selectedProject.id,taskId)}
            onUpdateProject={u=>updateProject(selectedProject.id,u)}
            onUpdateTask={(taskId,u)=>updateTask(selectedProject.id,taskId,u)}
            onDeleteTask={taskId=>deleteTask(selectedProject.id,taskId)}
            onAddTask={()=>setModal({type:"new-task",projectId:selectedProject.id})}
            onAddMaterial={()=>setModal({type:"new-material",projectId:selectedProject.id})}
            onDeleteMaterial={matId=>deleteMaterial(selectedProject.id,matId)}
            settings={settings} onBack={()=>setSelectedProjectId(null)}
            onDuplicate={()=>duplicateProject(selectedProject)}/>
        ):tab==="projects"?<ProjectsTab projects={projects} onSelect={setSelectedProjectId} onAdd={()=>setModal({type:"new-project"})} activeTimer={activeTimer}/>
        :tab==="scraps"?<ScrapsTab scraps={scraps} onAdd={()=>setModal({type:"new-scrap"})} onDelete={id=>setScraps(prev=>prev.filter(s=>s.id!==id))} onStartProject={startFromScrap}/>
        :tab==="knowledge"?<KnowledgeTab/>
        :tab==="ideas"?<IdeasTab ideas={ideas} onAdd={()=>setModal({type:"new-idea"})} onDelete={id=>setIdeas(prev=>prev.filter(i=>i.id!==id))} onStartFromIdea={startFromIdea}/>
        :<ToolsTab settings={settings}/>}
      </div>

      {!selectedProject&&<BottomNav active={tab} onChange={handleTabChange}/>}

      {modal?.type==="new-project"  &&<NewProjectModal  onSave={addProject} onClose={()=>setModal(null)}/>}
      {modal?.type==="new-task"     &&<NewTaskModal     onSave={t=>addTask(modal.projectId,t)} onClose={()=>setModal(null)}/>}
      {modal?.type==="new-material" &&<NewMaterialModal onSave={m=>addMaterial(modal.projectId,m)} onClose={()=>setModal(null)} currency={settings.currency}/>}
      {modal?.type==="new-scrap"    &&<NewScrapModal    onSave={s=>{setScraps(prev=>[{...s,id:uid()},...prev]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==="new-idea"     &&<NewIdeaModal     onSave={i=>{setIdeas(prev=>[{...i,id:uid()},...prev]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==="settings"     &&<SettingsModal    settings={settings} onSave={s=>setSettings(s)} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(CernunnosWorkshop)
);
  </script>
</body>
</html>
